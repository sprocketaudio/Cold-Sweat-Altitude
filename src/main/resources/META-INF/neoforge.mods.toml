modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}" #mandatory
license="${mod_license}"
[[mods]] #mandatory
modId="${mod_id}" #mandatory
version="${mod_version}" #mandatory
displayName="${mod_name}" #mandatory
description='''
Cold Sweat: Altitude is a generic Cold Sweat addon for NeoForge 1.21.1.
It adds configurable altitude bands for pack-defined temperature progression on top
of Cold Sweat's existing temperature systems.
'''
[[dependencies.${mod_id}]] #optional
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="[${neo_version},)" #mandatory
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="cold_sweat"
    type="required"
    versionRange="[${cold_sweat_version},)"
    ordering="AFTER"
    side="BOTH"
